name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Trigger deploy webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          BODY='{"ref":"refs/heads/main"}'
          SIG="sha1=$(echo -n "$BODY" | openssl dgst -sha1 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature: $SIG" \
            -d "$BODY" \
            "$WEBHOOK_URL"
