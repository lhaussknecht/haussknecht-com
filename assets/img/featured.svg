<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f1f5f9"/>
  <!-- Circuit/network pattern -->
  <g stroke="#cbd5e1" stroke-width="1.5" fill="none">
    <line x1="100" y1="200" x2="300" y2="200"/>
    <line x1="500" y1="200" x2="700" y2="200"/>
    <line x1="300" y1="100" x2="300" y2="300"/>
    <line x1="500" y1="100" x2="500" y2="300"/>
    <line x1="300" y1="100" x2="500" y2="100"/>
    <line x1="300" y1="300" x2="500" y2="300"/>
    <line x1="200" y1="150" x2="300" y2="150"/>
    <line x1="500" y1="150" x2="600" y2="150"/>
    <line x1="200" y1="250" x2="300" y2="250"/>
    <line x1="500" y1="250" x2="600" y2="250"/>
  </g>
  <!-- Nodes -->
  <g fill="#64748b">
    <circle cx="100" cy="200" r="6"/>
    <circle cx="700" cy="200" r="6"/>
    <circle cx="200" cy="150" r="4"/>
    <circle cx="200" cy="250" r="4"/>
    <circle cx="600" cy="150" r="4"/>
    <circle cx="600" cy="250" r="4"/>
  </g>
  <!-- Central element: code brackets -->
  <g transform="translate(400,200)">
    <rect x="-100" y="-100" width="200" height="200" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
    <text x="-60" y="15" font-family="monospace" font-size="72" font-weight="bold" fill="#334155">&lt;/&gt;</text>
  </g>
  <!-- Corner dots -->
  <g fill="#94a3b8">
    <circle cx="300" cy="100" r="5"/>
    <circle cx="500" cy="100" r="5"/>
    <circle cx="300" cy="300" r="5"/>
    <circle cx="500" cy="300" r="5"/>
  </g>
</svg>
