<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f1f5f9"/>
  <!-- Infinity/DevOps loop -->
  <g transform="translate(400,200)" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left loop -->
    <path d="M-20,0 C-20,-50 -80,-60 -110,-40 C-140,-20 -140,20 -110,40 C-80,60 -20,50 -20,0"/>
    <!-- Right loop -->
    <path d="M20,0 C20,50 80,60 110,40 C140,20 140,-20 110,-40 C80,-60 20,-50 20,0"/>
  </g>
  <!-- Arrows on the loop -->
  <g fill="#64748b" stroke="none">
    <polygon points="280,168 290,160 280,152" transform="translate(0,0)"/>
    <polygon points="520,232 510,240 520,248" transform="translate(0,0)"/>
  </g>
  <!-- Left side: Dev icons -->
  <g transform="translate(260,200)" fill="none" stroke="#475569" stroke-width="2.5">
    <!-- Code bracket -->
    <polyline points="-8,-14 -18,0 -8,14"/>
    <polyline points="8,-14 18,0 8,14"/>
  </g>
  <!-- Right side: Ops icons -->
  <g transform="translate(540,200)" fill="none" stroke="#475569" stroke-width="2.5">
    <!-- Gear -->
    <circle cx="0" cy="0" r="8"/>
    <circle cx="0" cy="0" r="3"/>
    <line x1="0" y1="-12" x2="0" y2="-8"/>
    <line x1="0" y1="8" x2="0" y2="12"/>
    <line x1="-12" y1="0" x2="-8" y2="0"/>
    <line x1="8" y1="0" x2="12" y2="0"/>
  </g>
  <!-- Pipeline steps below -->
  <g transform="translate(400,320)">
    <g fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5">
      <rect x="-180" y="-15" width="72" height="30" rx="6"/>
      <rect x="-84" y="-15" width="72" height="30" rx="6"/>
      <rect x="12" y="-15" width="72" height="30" rx="6"/>
      <rect x="108" y="-15" width="72" height="30" rx="6"/>
    </g>
    <g font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">
      <text x="-144" y="5">Build</text>
      <text x="-48" y="5">Test</text>
      <text x="48" y="5">Deploy</text>
      <text x="144" y="5">Monitor</text>
    </g>
    <!-- Arrows between pipeline steps -->
    <g stroke="#94a3b8" stroke-width="1.5" fill="#94a3b8">
      <line x1="-108" y1="0" x2="-88" y2="0"/>
      <polygon points="-88,-3 -82,0 -88,3"/>
      <line x1="-12" y1="0" x2="8" y2="0"/>
      <polygon points="8,-3 14,0 8,3"/>
      <line x1="84" y1="0" x2="104" y2="0"/>
      <polygon points="104,-3 110,0 104,3"/>
    </g>
  </g>
  <!-- Top label -->
  <text x="400" y="90" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="4">CI / CD</text>
</svg>
