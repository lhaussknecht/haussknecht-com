<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f1f5f9"/>
  <!-- Terminal window -->
  <g transform="translate(400,190)">
    <rect x="-160" y="-90" width="320" height="200" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="-160" y="-90" width="320" height="32" rx="12" fill="#cbd5e1"/>
    <rect x="-160" y="-70" width="320" height="12" fill="#cbd5e1"/>
    <!-- Window dots -->
    <circle cx="-140" cy="-74" r="5" fill="#94a3b8"/>
    <circle cx="-124" cy="-74" r="5" fill="#94a3b8"/>
    <circle cx="-108" cy="-74" r="5" fill="#94a3b8"/>
    <!-- Code lines -->
    <g font-family="monospace" font-size="14" fill="#475569">
      <text x="-130" y="-30"><tspan fill="#64748b">func</tspan> main() {</text>
      <text x="-110" y="-8">  app.<tspan fill="#334155">Start</tspan>()</text>
      <text x="-130" y="14">}</text>
    </g>
    <!-- Cursor blink line -->
    <rect x="-130" y="34" width="8" height="16" fill="#64748b" opacity="0.6"/>
  </g>
  <!-- Floating elements around terminal -->
  <g fill="none" stroke="#94a3b8" stroke-width="2">
    <!-- Database symbol left -->
    <g transform="translate(140,160)">
      <ellipse cx="0" cy="-10" rx="20" ry="8"/>
      <line x1="-20" y1="-10" x2="-20" y2="10"/>
      <line x1="20" y1="-10" x2="20" y2="10"/>
      <ellipse cx="0" cy="10" rx="20" ry="8"/>
    </g>
    <!-- Mobile device right -->
    <g transform="translate(660,160)">
      <rect x="-14" y="-22" width="28" height="44" rx="4"/>
      <line x1="-6" y1="16" x2="6" y2="16"/>
    </g>
    <!-- Cloud top -->
    <g transform="translate(400,60)">
      <path d="M-20,8 A12,12 0 0,1 -8,-8 A16,16 0 0,1 24,-4 A10,10 0 0,1 20,12 Z"/>
    </g>
  </g>
  <!-- Connecting dotted lines -->
  <g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4">
    <line x1="160" y1="170" x2="240" y2="190"/>
    <line x1="640" y1="170" x2="560" y2="190"/>
    <line x1="400" y1="75" x2="400" y2="100"/>
  </g>
</svg>
